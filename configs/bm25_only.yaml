# BM25-only: lexical retrieval alone, no dense leg. Not a wasted run — it is the
# evidence that fusion beats EITHER leg alone, turning "I added hybrid" into an
# experiment rather than a fashion choice (docs/DECISIONS.md D7).
name: bm25_only

retrieval:
  corpus_filter:
    grand_prix: Silverstone
  dense:
    enabled: false
    top_k: 20
  bm25:
    enabled: true
    top_k: 20
  fusion:
    method: none
    rrf_k: 60
  multi_query:
    enabled: false
    n_queries: 3
    mode: decompose
  rerank:
    enabled: false
    model: BAAI/bge-reranker-base
    candidates: 20
    top_n: 5

generation:
  enabled: false        # retrieval-metrics ablation row
  model: llama3.2
  temperature: 0.0
  context_top_n: 5

eval:
  golden_set: eval/golden_set.jsonl
  judge_model: gemini-2.5-flash
  ragas: false
  k_values: [3, 5, 10]
