# Naive baseline: single dense vector search, no fusion / multi-query / rerank.
# This is the frozen reference (Phase 3). Every later config is expressed as a
# delta against the run this produces. It shares the dense retrieval depth (20)
# and generation context size (5) with all other configs, so the ONLY thing that
# changes downstream is the retrieval technique — not how deep we look or how much
# context the LLM sees.
#
# NB: the live app uses top_k=4 (backend/chain.py). The frozen baseline standardizes
# retrieval depth at 20 so recall@10 / nDCG@10 are well-defined and the ablation is
# apples-to-apples; the LLM still sees only the top 5, close to the app's top 4.
name: baseline

retrieval:
  corpus_filter:
    grand_prix: Silverstone   # applied to every leg; other races stay untested
  dense:
    enabled: true
    top_k: 20
  bm25:
    enabled: false
    top_k: 20
  fusion:
    method: none              # none | rrf
    rrf_k: 60
  multi_query:
    enabled: false
    n_queries: 3
    mode: decompose           # paraphrase | decompose
  rerank:
    enabled: false
    model: BAAI/bge-reranker-base
    candidates: 20
    top_n: 5

generation:
  enabled: true               # generate answers so RAGAS + abstention can be scored
  model: llama3.2
  temperature: 0.0
  context_top_n: 5            # top-5 chunks go to the LLM

eval:
  golden_set: eval/golden_set.jsonl
  judge_model: gemini-2.0-flash
  ragas: true                 # scored only if a Gemini key is present, else recorded as skipped
  k_values: [3, 5, 10]
