# The full pipeline: dense + BM25 -> RRF -> multi-query decomposition -> cross-encoder
# rerank -> top-5 to the LLM. Every component on. This is the maximal config; whether
# it is the BEST config is an empirical question answered by EVALUATION.md (multi-query's
# latency cost may make hybrid_rerank the better ship). generation on so it can also be
# run with RAGAS once Gemini quota is available.
name: full

retrieval:
  corpus_filter:
    grand_prix: Silverstone
  dense:
    enabled: true
    top_k: 20
  bm25:
    enabled: true
    top_k: 20
  fusion:
    method: rrf
    rrf_k: 60
  multi_query:
    enabled: true
    n_queries: 3
    mode: decompose
  rerank:
    enabled: true
    model: BAAI/bge-reranker-base
    candidates: 20
    top_n: 5

generation:
  enabled: true
  model: llama3.2
  temperature: 0.0
  context_top_n: 5

eval:
  golden_set: eval/golden_set.jsonl
  judge_model: gemini-2.5-flash
  ragas: false          # flip to true once Gemini judge quota is available
  k_values: [3, 5, 10]
